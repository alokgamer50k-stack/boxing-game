<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8K ULTRA PRO STORE</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #d500f9;
            --bg: #050508;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
            /* 8K Vibe Gradient */
            background: radial-gradient(circle at top right, #1a0033, transparent),
                        radial-gradient(circle at bottom left, #001a33, transparent);
        }

        /* --- Navbar --- */
        nav {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        .search-bar {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            width: 40%;
            outline: none;
        }

        .menu-dots {
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
        }

        /* --- 8K Shine Card --- */
        .store-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 5%;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        /* 8K Shine Effect */
        .card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: shine8k 4s infinite;
        }

        @keyframes shine8k {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-free { background: rgba(255,255,255,0.1); color: white; }
        .btn-direct { 
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 0 15px var(--secondary);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .search-bar { width: 30%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PRO APK</div>
        <input type="text" class="search-bar" placeholder="Search MODs...">
        <div class="menu-dots">⋮</div>
    </nav>

    <div class="store-container">
        <div class="card">
            <img src="https://via.placeholder.com/300x180/1a1a1a/00f2fe?text=FF+MOD+MENU" alt="apk">
            <h3>V-Badge Mod OB53</h3>
            <p style="color: #888;">Size: 45MB | Price: ₹5.00</p>
            <div class="btn-group">
                <button class="btn btn-free">Free</button>
                <button class="btn btn-direct">Direct</button>
            </div>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x180/1a1a1a/d500f9?text=DIAMOND+HACK" alt="apk">
            <h3>Diamond Script v2</h3>
            <p style="color: #888;">Size: 12MB | Price: ₹10.00</p>
            <div class="btn-group">
                <button class="btn btn-free">Free</button>
                <button class="btn btn-direct">Direct</button>
            </div>
        </div>
    </div>

</body>
</html>
